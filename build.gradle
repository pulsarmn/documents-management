plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

dependencies {

}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'org.pulsar.documents.Launcher'
}

javafx {
    version = '25'
    modules = ['javafx.controls', 'javafx.fxml']
}

test {
    useJUnitPlatform()
}
